[profile.default]
src = "src"
out = "out"
libs = ["lib"]
optimizer = true

fs_permissions = [{ access = "read-write", path = "cache"}, { access = "read", path = ".treb/registry.json"}, { access = "read", path = "script/networks" }]

[rpc_endpoints] 
# vbase = "${TENDERLY_VBASE_RPC_URL}"
# vbase_root = "${TENDERLY_VBASE_ROOT_RPC_URL}"
# vcelo = "${TENDERLY_VCELO_RPC_URL}"
# vcelo_root = "${TENDERLY_VCELO_ROOT_RPC_URL}"
celo = "${CELO_RPC_URL}"
celo_sepolia = "${CELO_SEPOLIA_RPC_URL}"
chain-11142220 = "${CELO_SEPOLIA_SEPOLIA_RPC_URL}"
monad_testnet = "${MONAD_TESTNET_RPC_URL}"

[etherscan]
# vbase = { key = "${TENDERLY_ACCESS_TOKEN}", chain = 8453, url = "${TENDERLY_VBASE_RPC_URL}/verify/etherscan" }
monad_testnet = { key = "${ETHERSCAN_API_KEY}", chain = 10143, url = "https://api.etherscan.io/v2/api?chain=10143"}
celo_sepolia = { key= "${ETHERSCAN_API_KEY}", chain = 11142220, url = "https://api.etherscan.io/v2/api?chain=11142220" }


[profile.default.treb.senders.deployer]
type = "private_key"
private_key = "${DEPLOYER_PRIVATE_KEY}"

[profile.default.treb.senders.reporter]
type = "private_key"
private_key = "${REPORTER_PRIVATE_KEY}"

[profile.virtual.treb.senders.deployer]
type = "safe"
safe = "0x32CB58b145d3f7e28c45cE4B2Cc31fa94248b23F"
signer = "proposer"

[profile.virtual.treb.senders.proposer]
type = "private_key"
private_key = "${DEPLOYER_PRIVATE_KEY}"

[profile.throwaway.treb.senders.deployer]
type = "private_key"
private_key = "${DEPLOYER_PRIVATE_KEY}"


