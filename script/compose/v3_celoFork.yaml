group: Mento V3 (Celo Fork 28/02)
components:
  SetupLocalFork:
    script: SetupLocalFork
  DeployV3PreStage:
    script: DeployV3PreStage
    deps: [ 'SetupLocalFork']
    env:
      MARKET_HOURS_BREAKER_TOGGLEABLE: true
  DeployV3PreStage2:
    script: DeployV3PreStage2
    deps: [ 'DeployV3PreStage' ]
    env:
      MARKET_HOURS_BREAKER_TOGGLEABLE: true
  ConfigureV3PreStage:
    script: ConfigureV3PreStage
    deps: [ 'DeployV3PreStage2' ]
    env:
      MARKET_HOURS_BREAKER_TOGGLEABLE: true
  UpgradeStableTokenV3_USDm:
    script: UpgradeStableTokenV3
    deps: [ 'ConfigureV3PreStage' ]
    env:
      TOKEN_SYMBOL=USDm
  UpgradeStableTokenV3_GBPm:
    script: UpgradeStableTokenV3
    deps: [ 'ConfigureV3PreStage' ]
    env:
      TOKEN_SYMBOL=GBPm
  UpgradeStableTokenV3_EURm:
    script: UpgradeStableTokenV3
    deps: [ 'ConfigureV3PreStage' ]
    env:
      TOKEN_SYMBOL=EURm
  CreateFPMM:
    script: CreateFPMM
    deps: [ 'UpgradeStableTokenV3_USDm', 'UpgradeStableTokenV3_GBPm', 'UpgradeStableTokenV3_EURm' ]
  DeployVirtualPools:
    script: DeployVirtualPools
    deps: [ 'SetupLocalFork'] 
  DeployCDPLiquidityStrategy:
    script: DeployCDPLiquidityStrategy
    deps: [ 'CreateFPMM'] 
  DeployLiquityV2:
    script: DeployLiquityV2
    env:
      token: GBPm
    deps: ['DeployCDPLiquidityStrategy']
  DeployLiquityV2_2:
    script: DeployLiquityV2_2
    env:
      token: GBPm
    deps: ['DeployLiquityV2']
  MigrateStableToCDP:
    script: MigrateStableToCDP
    env:
      token: GBPm
    deps: ['DeployLiquityV2_2']
