group: Mento Protocol
components:
  ProxyAdmin:
    script: DeployProxyAdmin
  AddressSortedLinkedListWithMedian:
    script: DeployAddressSortedLinkedListWithMedian
  SortedOracles:
    script: DeploySortedOracles
    deps:
      - AddressSortedLinkedListWithMedian
      - ProxyAdmin
  BreakerBox:
    script: DeployBreakerBox
    deps: 
      - ChainlinkRelayers
      - SortedOracles
  Broker:
    script: DeployBroker
    deps:
      - ProxyAdmin
  MentoRouter:
    script: DeployMentoRouter
    deps:
      - Broker
  MockCollaterals:
    script: DeployMockCollaterals
  Reserve:
    script: DeployReserve
    deps: 
      - ProxyAdmin
      - MockCollaterals
  PricingModules:
    script: DeployPricingModules
  Tokens:
    script: DeployTokens
    deps: 
      - ProxyAdmin
      - Broker
  BiPoolManager:
    script: DeployBiPoolManager
    deps:
      - PricingModules
      - Broker
      - Reserve
      - SortedOracles
      - BreakerBox
  ChainlinkRelayerFactory:
    script: DeployChainlinkRelayerFactory
    deps:
      - SortedOracles
      - ProxyAdmin
  MockChainlinkAggregators:
    script: DeployMockAggregators
  ChainlinkRelayers:
    script: DeployChainlinkRelayers
    deps:
      - MockChainlinkAggregators
      - ChainlinkRelayerFactory
  Relay:
    script: Relay.s.sol
    deps:
      - ChainlinkRelayers
  CreateExchangePools:
    script: CreateExchangePools
    deps:
      - ChainlinkRelayers
      - BiPoolManager
      - Tokens
