group: Mento V3 Dependencies
components:
  USDm:
    script: DeployStableTokenSpoke
    env:
      SPOKE_LABEL: "USDm"
      SPOKE_TOKEN_NAME: "Mento Dollar"
      SPOKE_TOKEN_SYMBOL: "USDm"
  GBPm:
    script: DeployStableTokenSpoke
    env:
      SPOKE_LABEL: "GBPm"
      SPOKE_TOKEN_NAME: "Mento British Pound"
      SPOKE_TOKEN_SYMBOL: "GBPm"
  ProxyAdmin:
    script: DeployProxyAdmin
  AddressSortedLinkedListWithMedian:
    script: DeployAddressSortedLinkedListWithMedian
  SortedOracles:
    script: DeploySortedOracles
    deps:
      - USDm
      - GBPm
      - AddressSortedLinkedListWithMedian
      - ProxyAdmin
  BreakerBox:
    script: DeployBreakerBox
    deps: 
      - ChainlinkRelayers
      - SortedOracles
  MockChainlinkAggregators:
    script: DeployMockAggregators
    deps:
      - USDm
      - GBPm
  ChainlinkRelayers:
    script: DeployChainlinkRelayers
    deps:
      - MockChainlinkAggregators
      - ChainlinkRelayerFactory
  ChainlinkRelayerFactory:
    script: DeployChainlinkRelayerFactory
    deps:
      - SortedOracles
      - ProxyAdmin
